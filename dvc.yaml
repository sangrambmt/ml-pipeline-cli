stages:
  pipeline:
    cmd: python src/main.py --input data/raw/sample.csv
    deps:
    - data/raw/sample.csv
    - src/evaluate.py
    - src/ingest.py
    - src/main.py
    - src/train.py
    - src/validate.py
    outs:
    - data/processed/clean.csv
    - metrics/metrics.json
    - models/model.pkl
